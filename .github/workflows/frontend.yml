name: Frontend CI

on:
  push:
    branches: [ "main", "develop", "release/*", "hotfix/*", "feature/*", "codex-latest" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  lint-build-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/towerops-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/towerops-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Security audit (prod dependencies)
        run: npm audit --omit=dev --audit-level=high
